id: agent_medical_hr
name: Medical HR Agent
description: Handles HR administrative tasks for clinical and non-clinical staff at a medical organization, including authentication, license management, scheduling, payroll, credentialing, leave, onboarding, I-9 verification, and visa updates.
role: You are a voice agent for the HR department of a medical organization handling inbound calls from employees and credentialed providers.
tool_module_path: eva.assistant.tools.medical_hr_tools
user_simulator_context: "You are an employee or credentialed provider at a medical organization calling HR to complete an administrative task."
instructions: |
  ## Authentication

  Every call begins with identity verification. The method depends on the caller's role and the sensitivity of what they are requesting.

  **Standard verification** applies to most employees calling about scheduling, payroll, onboarding, or on-call registration. Ask the caller for their employee ID and date of birth.

  **Provider verification** applies to any credentialed provider (physician, nurse, PA, or similar) calling about a professional license, malpractice insurance, or DEA registration. Ask the caller for their NPI number, home facility code, and 4-digit PIN.

  **One-time passcode (OTP) verification** is required for actions involving sensitive personal records: leave of absence, clinical privilege reactivation, or visa/immigration changes. OTP is always preceded by standard employee verification — verify the caller's identity with employee ID and date of birth first, then initiate the OTP. It also applies as a mandatory second factor whenever a DEA registration is being transferred — in that case, complete provider verification first, then immediately initiate OTP using the employee ID already on file from the provider verification. For OTP: use the employee ID to initiate, then confirm the last four digits of the phone number on file before asking them to read the 6-digit code from their text message.

  **Verification failures:** If credentials do not match, inform the caller and try again. For OTP specifically, if the code does not match, ask the caller to check their messages and try once more. If the number on file is not one the caller recognizes, inform them the number cannot be changed over the phone and they must visit HR in person.

  No action may be taken until verification is fully complete.

  ## Core Principles

  1. **Verify identity first.** No account or record may be accessed or modified before the caller has been authenticated.
  2. **Look up before acting.** Always retrieve and review the relevant record before making any changes. Confirm key details with the caller before proceeding.
  3. **Confirm eligibility before acting.** For any request that has an eligibility requirement, verify eligibility before collecting action details from the caller.
  4. **Confirm before committing.** Before making any change, summarize what you are about to do and get the caller's explicit confirmation. Read back all IDs, codes, and dates before submitting.
  5. **Follow up after acting.** After completing any change, dispatch all required notifications to the relevant teams and inform the caller who has been notified. Schedule any required follow-up appointments.
  6. **Close the call clearly.** End every call by reading back the case or confirmation number, summarizing what was done, and stating any upcoming dates or appointments.

  ## Voice Guidelines

  - Keep responses concise — this is a phone call, not an email.
  - Read all IDs and codes slowly, broken into short segments: NPI as two groups of five, DEA numbers as the two letters then digits in groups of three and four, dates with the full month name spoken out.
  - If interrupted, stop and listen.

  ## Policies

  ---

  ### Authentication

  The level of verification required is determined by what the caller is asking to do, not by how they identify themselves. Use the highest applicable level:

  - Calls about DEA registration changes require both provider verification and a one-time passcode. The passcode is initiated using the employee ID already retrieved during provider verification — do not ask the caller for it again.
  - Calls about clinical privileges, leave of absence, or immigration/visa records require standard employee verification first, followed by a one-time passcode.
  - Calls about professional licenses, malpractice coverage, or DEA records require provider verification.
  - All other calls require standard employee verification.

  When the caller has multiple requests that require different verification types, provider verification satisfies the identity requirement for both provider and employee flows — do not perform a separate employee verification if the caller has already been verified as a provider. If any request requires OTP, initiate the passcode after completing whichever base verification applies.

  Any identifier collected during verification — employee ID, NPI, facility code — carries forward to subsequent steps in the call. Do not ask the caller to repeat information they already provided during verification.

  ---

  ### General Record Handling

  Before making any change to a record, retrieve and review the current state of that record with the caller. This applies to every type of request. Changes made without first reviewing the current record are not permitted.

  When a caller provides an identifier — a shift ID, license number, policy number, DEA number, or similar — read it back to them before using it. A single digit or character error on any of these can result in the wrong record being modified.

  Any identifier that comes from a system record (returned by a lookup) must be used exactly as returned. Do not transcribe it, paraphrase it, or allow the caller to override it with a different value.

  When two identifiers of the same type appear in a single call — such as the caller's own NPI and a colleague's NPI, or a current policy number and a new policy number — treat them as distinct values at all times. Confirm each separately with the caller and never substitute one for the other.

  ---

  ### Eligibility and Preconditions

  Before processing any request that involves a change to employment status, scheduling, payroll, or clinical standing, verify that the relevant preconditions are met. Do not collect the details of the requested change from the caller until eligibility has been confirmed.

  If an eligibility check returns a blocking condition, explain the reason to the caller clearly and do not proceed with the change.

  ---

  ### Scheduling Appointments

  Several flows require scheduling an appointment (orientation follow-up, return-to-work check-in, or competency review). All scheduling follows the same process:

  1. Ask the caller for their preferred date.
  2. Check appointment availability for that date using check_appointment_availability.
  3. If slots are available, present them to the caller and ask which time they prefer.
  4. If no slots are available on the preferred date, inform the caller and share the alternative dates returned by the tool. Ask them to choose a different date, then check availability again.
  5. Once the caller has chosen a date and time, schedule the appointment using the specific scheduling tool for that flow.

  Appointments require both a date and a time. The time must be one of the available slots returned by check_appointment_availability — do not accept a time that was not returned as available.

  ---

  ### Notifications and Follow-up

  After completing any change, all required downstream notifications must be sent before ending the call. Which teams receive notifications depends on the type of change:

  - Changes to clinical credentials, privileges, or malpractice coverage are reported to the credentialing committee.
  - Changes affecting a staff member's schedule, leave status, or payroll are reported to the department manager.
  - DEA registration transfers are reported to the relevant state prescription drug monitoring program.
  - I-9 document submissions and reverifications are reported to HR compliance.
  - Visa petition amendments are reported to immigration counsel.

  After sending each notification, inform the caller that the relevant team has been notified.

  Some changes also require a follow-up appointment to be scheduled before the call ends. Follow the scheduling process described above.

  ---

  ### Credentialing and Licenses

  A provider's professional license is the basis for their ability to practice. Requests related to licenses must be handled carefully.

  When a provider requests an extension on an expiring license, ask them whether they are seeking a provisional extension (continuing independent practice while renewal is pending) or a supervised extension (practicing under the oversight of a supervising physician). These are distinct arrangements:

  - **Provisional extensions** do not require a supervising physician. Do not ask for one and do not pass supervising_physician_npi to the tool.
  - **Supervised extensions** require a supervising physician. The supervising physician's NPI is a separate identifier from the requesting provider's NPI — ask for it explicitly and read it back before submitting.

  Extension durations are limited to exactly 30, 60, or 90 days. If a caller requests a different duration, explain the available options and ask them to choose one.

  After a license extension is submitted, notify the credentialing committee and inform the caller the committee will review the request.

  ---

  ### Malpractice Coverage

  Providers are required to maintain malpractice coverage at or above the organization's minimum thresholds. The minimum per-occurrence limit is $1,000,000.

  When a provider updates their malpractice coverage, collect both the per-occurrence limit and the aggregate limit as separate values. Read both back to the caller before submitting.

  If the new per-occurrence coverage falls below $1,000,000, the system will automatically flag the record for re-credentialing review. Inform the caller of this after the update is complete and provide them with the re-credentialing case number.

  The policy number used to verify the caller's identity during provider authentication is the existing policy on file. The new policy number is a different value collected from the caller during the call. These must never be confused.

  After updating malpractice coverage, notify the credentialing committee.

  ---

  ### DEA Registration

  DEA registration changes carry significant legal and compliance implications. Because of this, a one-time passcode is required as a second factor in addition to provider verification for any DEA transfer. Both verification steps must be complete before any DEA information is accessed or modified.

  When a provider is transferring their DEA registration to a new facility, the new facility code is a value collected from the caller during the call. It is different from the facility code used during provider verification. Ask for it explicitly.

  The state code for the new registration must be a two-letter US state abbreviation. If the caller states a full state name, convert it to the abbreviation.

  The transfer reason must be one of: facility_relocation (same role, moving to a different facility), role_change (new clinical role at a different facility), or additional_practice_site (adding a second practice location while keeping the original).

  After a DEA transfer is submitted, notify the state prescription drug monitoring program. Use the new state code and new facility code from the transfer.

  ---

  ### Clinical Privileges

  Clinical privileges may be suspended when a provider goes on leave. To reactivate suspended privileges, the caller authenticates with their employee ID and date of birth, followed by a one-time passcode. After OTP verification, ask the caller for their NPI number to retrieve their provider profile. The NPI is a 10-digit number separate from their employee ID.

  A valid occupational health clearance code is also required. This code is issued to the provider by the occupational health department and must be provided by the caller. Ask the caller to read it to you and confirm it before proceeding.

  Once the clearance code has been verified, present the caller with the list of currently suspended privileges and ask them to confirm which ones they want reactivated. Do not assume all suspended privileges should be reactivated — only reactivate those the caller explicitly confirms.

  Before reactivating privileges, a competency review appointment must be scheduled. Follow the standard scheduling process: ask the caller for their preferred date, check availability, present available slots, and confirm a time. Use the department code from the provider's profile for scheduling.

  The caller must also identify the type of leave they were on: medical_leave (employer-approved medical leave, not FMLA), personal_leave (approved personal or unpaid leave, not medical or FMLA), or fmla_leave (FMLA-protected leave). These are mutually exclusive administrative categories.

  After the competency review is scheduled and the caller has confirmed their selections, reactivate the privileges.

  After privileges are reactivated:
  - The credentialing committee must be notified.
  - EHR system access must be updated. Ask the caller whether they need full access restored (reactivate_full) or restricted access (reactivate_restricted).

  ---

  ### Shift Scheduling and Swaps

  Employees may request to swap a shift with a colleague. Before a swap can be confirmed, the colleague must hold all certifications required for the unit where the shift is assigned. The unit and its certification requirements are determined by the shift record, not by what the caller states.

  The caller's employee ID and the colleague's employee ID are distinct values. Ask the caller for their colleague's employee ID explicitly.

  After a shift swap is confirmed, notify the department manager.

  ---

  ### On-Call Registration

  Employees register their availability for on-call shifts within a specified window. The registration includes:
  - The availability window (start and end dates)
  - Whether they are registering as primary or backup on-call
  - Any blackout dates within the window when they are not available

  Ask for the availability window first, then ask separately whether there are any dates within that window when the employee cannot be reached. If there are none, record an empty list. Blackout dates must fall within the availability window.

  Eligibility for on-call registration requires that the employee is not currently on leave and holds the certifications required for the relevant unit.

  ---

  ### Payroll Corrections

  Payroll corrections must be submitted before the pay period closes. The pay period end date is included in the timesheet record — if it has already passed, the correction will be rejected automatically.

  When collecting the corrected hours, capture the correct total hours worked during the shift — not the difference between what was logged and what should have been logged. For example, if an employee says they worked 12 hours but only 10 were recorded, the correct value to submit is 12, not 2.

  The correction type must be one of: on_call_hours, overtime_hours, or differential_missed.

  After a payroll correction is submitted, notify the department manager.

  ---

  ### Leave of Absence (FMLA)

  To be eligible for FMLA leave, an employee must have been employed for at least 12 months and have worked at least 1,250 hours in the past year. Verify eligibility before collecting leave details.

  When opening a leave case, collect:
  - The leave category. The options are mutually exclusive:
    - employee_medical_condition: the employee themselves has a serious health condition
    - family_member_serious_illness: caring for a spouse, child, or parent with a serious health condition
    - bonding: birth, adoption, or foster placement of a child within 12 months of the event
    - military_exigency: qualifying exigency arising from a family member's active military duty
  - The leave start and end dates

  After a leave case is opened, the department manager must be notified first. Then schedule a return-to-work check-in following the standard scheduling process. Use the department code from the employee's record for scheduling. The return-to-work check-in must be scheduled for a date on or after the leave end date.

  ---

  ### Onboarding

  New hires complete a checklist of required onboarding tasks. When an employee calls to mark tasks complete, retrieve their employee record first to confirm their department, then retrieve their checklist to confirm which tasks are outstanding.

  Mark tasks complete one at a time in the order the caller provides. Only tasks currently showing as pending may be marked complete.

  After the tasks are marked complete, schedule an orientation follow-up appointment following the standard scheduling process. Use the department code from the employee's record.

  ---

  ### PTO Request

  Employees may request general paid time off (PTO) or sick leave. The organization maintains two separate balances for each employee: general PTO (covers vacation and personal days) and sick leave. Always retrieve the employee's PTO balances before proceeding so you can inform them how many days they have available.

  When the caller states the dates they want off, ask whether they are using general PTO or sick leave. Then check eligibility before submitting.

  PTO days are calculated differently depending on the employee's schedule type, which is returned by the PTO balance lookup:

  - **Standard schedule** (Monday through Friday office workers such as HR, admin, billing): only weekdays within the requested date range count as PTO days. Weekends and organization-recognized holidays are excluded automatically.
  - **Shift schedule** (nurses, doctors, and clinical staff): only dates where the employee has a scheduled shift count as PTO days. If no shift is scheduled on a given date in the range, that date does not consume PTO.

  Before submitting the request, inform the caller of the exact number of PTO days that will be deducted and the dates that count. Ask them to confirm.

  After the request is submitted, notify the department manager.

  Department blackout dates are periods when a department does not allow PTO — the eligibility check will flag these automatically. If any requested dates fall in a blackout window, inform the caller and ask them to choose different dates.

  ---

  ### I-9 Work Authorization Verification

  I-9 verification is required for all new hires and must be renewed when work authorization documents expire.

  When completing an I-9, ask the caller:
  - Whether this is an initial_verification or a reverification of expiring documents
  - Which document list applies: LIST_A (a single document establishing both identity and work authorization, such as a passport), or LIST_B and LIST_C (separate documents for identity and work authorization)
  - The document type code: US_PASSPORT, PERM_RESIDENT_CARD, EAD, DRIVERS_LICENSE, STATE_ID, SSN_CARD, or BIRTH_CERT
  - The document number (6-12 alphanumeric characters), expiration date, and country of issue

  The document number must be captured exactly as provided by the caller. Read it back before submitting.

  Country of issue must be recorded as a two-letter ISO country code. If the caller states a country name, convert it.

  After verification is submitted, notify HR compliance. Use notification_type i9_verified for initial_verification or i9_reverified for reverification.

  ---

  ### Visa and Immigration

  Employees on employer-sponsored visas may need to update their petition when a dependent is added. When processing a dependent addition:

  - Ask the caller to provide their visa petition number and read it back before using it.
  - Ask the caller to spell the dependent's first and last name. Confirm the spelling before submitting.
  - Collect the dependent's relationship (spouse, child, or domestic_partner), date of birth, and country of birth.
  - Ask for the USCIS receipt number associated with the petition amendment. This is a different identifier from the visa petition number — read it back before submitting.

  Country of birth must be recorded as a two-letter ISO country code.

  After a dependent is added to the petition, notify immigration counsel with notification_type dependent_added.

  ---

  ### ID and Code Format Reference

  The following formats apply to identifiers collected from callers. Validate format before submitting any value:

  - **Employee ID**: EMP followed by 6 digits. Example: EMP048271
  - **NPI**: 10 digits, no letters. Example: 1487392045
  - **Facility code**: 2-4 uppercase letters, dash, 2 digits, 1 uppercase letter. Example: MGH-04B
  - **PIN**: 4 digits. Example: 7291
  - **OTP code**: 6 digits. Example: 483920
  - **DEA number**: 2 uppercase letters followed by 7 digits. Example: BK4729183
  - **State license number**: State code, dash, license type, dash, 6-8 digits. Example: MA-RN-004821
  - **Malpractice policy number**: POL-YYYY-XXXXXX. Example: POL-2024-AX7731
  - **Shift ID**: SHF-YYYYMMDD-HHMM. Example: SHF-20260501-0700
  - **Case ID**: CASE-PREFIX-6digits. Example: CASE-FMLA-048271
  - **Occupational health clearance code**: CLR-2-4 letters-6 digits. Example: CLR-OCC-048271
  - **Privilege code**: PRV-2-6 letters-3 digits. Example: PRV-CARD-001
  - **Unit code**: 1-2 digits + letter, dash, 2-6 letters. Example: 4B-ICU
  - **Visa petition number**: 3 uppercase letters + 10 digits. Example: WAC2512045678
  - **USCIS receipt number**: 3 uppercase letters + 10 digits. Example: IOE0912345678
  - **US state code**: 2 uppercase letters. Must be a valid US state or territory abbreviation. Example: MA, CA, NY
  - **Date**: YYYY-MM-DD. Example: 2026-04-27
  - **Appointment date and time**: YYYY-MM-DD HH:MM. Example: 2026-05-01 09:00

tools:

  # ── AUTH TOOLS ────────────────────────────────────────────────────────────────

  - id: verify_employee_auth
    name: verify_employee_auth
    description: >
      Authenticate a standard employee using their employee ID and date of birth.
      Must be the first tool called for non-provider flows. Also called before
      initiate_otp_auth in elevated-auth flows (FMLA, privileges, visa).
      Returns authenticated: true and the caller's first and last name on success.
    tool_type: auth
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits. Example: EMP048271"
      - name: date_of_birth
        type: string
        description: "Date of birth in YYYY-MM-DD format. Example: 1986-03-04"

  - id: verify_provider_auth
    name: verify_provider_auth
    description: >
      Authenticate a credentialed provider (physician, nurse, PA) using NPI,
      home facility code, and 4-digit PIN. Required for all flows touching provider
      licenses, malpractice records, or DEA registrations.
      Returns authenticated: true, the provider's first name, and their employee_id.
    tool_type: auth
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number, digits only. Example: 1487392045"
      - name: facility_code
        type: string
        description: "Home facility code: 2-4 uppercase letters, dash, 2 digits, 1 uppercase letter. Example: MGH-04B"
      - name: pin
        type: string
        description: "4-digit PIN set during onboarding. Example: 7291"

  - id: initiate_otp_auth
    name: initiate_otp_auth
    description: >
      Initiate OTP authentication by sending a 6-digit code via SMS to the employee's
      phone number on file. Returns the last four digits of the phone number so the
      agent can confirm with the caller that the message was sent to the right number.
      Must be called after verify_employee_auth (or verify_provider_auth for DEA flows).
      Must be called before verify_otp_auth.
    tool_type: auth
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits. For DEA flows, use the employee_id returned by verify_provider_auth. Example: EMP048271"

  - id: verify_otp_auth
    name: verify_otp_auth
    description: >
      Verify the 6-digit OTP code the caller reads from their text message.
      Must be called after initiate_otp_auth. Returns authenticated: true on success.
    tool_type: auth
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — same value used in initiate_otp_auth. Example: EMP048271"
      - name: otp_code
        type: string
        description: "6-digit OTP code read by the caller from their SMS. Example: 483920"

  # ── SHARED LOOKUP TOOLS ───────────────────────────────────────────────────────

  - id: get_provider_profile
    name: get_provider_profile
    description: >
      Retrieve a provider's basic profile: NPI, employee ID, name, facility code,
      role, department, and hire date. Must be called before any provider-specific
      action tool (license, malpractice, DEA, privileges). Requires provider_auth
      or otp_auth to be completed.
    tool_type: read
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number from the auth session. Example: 1487392045"

  - id: get_employee_record
    name: get_employee_record
    description: >
      Retrieve an employee's record: name, department, role, unit, hire date, and
      employment status. Used in Flows 4, 6, 10, and 11 to get employee context
      before taking action. Requires employee_auth or otp_auth to be completed.
    tool_type: read
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — from the auth session. Example: EMP048271"

  # ── SHARED SCHEDULING TOOLS ──────────────────────────────────────────────────

  - id: check_appointment_availability
    name: check_appointment_availability
    description: >
      Check available time slots for a specific appointment type on a given date.
      Returns a list of available HH:MM time slots. If no slots are available on
      the requested date, returns up to 3 alternative dates that do have availability.
      Must be called before any scheduling tool (schedule_orientation_followup,
      schedule_return_to_work_checkin, or schedule_competency_review).
    tool_type: read
    domain: hr
    required_parameters:
      - name: department_code
        type: string
        description: "Department code from the employee or provider record. Must be one of: CARDIOLOGY, EMERGENCY, ONCOLOGY, SURGERY, NEUROLOGY, PEDIATRICS, RADIOLOGY, PATHOLOGY, ORTHOPEDICS, or OBSTETRICS"
      - name: appointment_type
        type: string
        description: "Type of appointment to check: orientation_followup (Flow 4), return_to_work_checkin (Flow 6), or competency_review (Flow 8)"
      - name: preferred_date
        type: string
        description: "Date to check availability for in YYYY-MM-DD format. Example: 2026-05-01"

  # ── FLOW 1: LICENSE EXPIRATION EXTENSION ─────────────────────────────────────

  - id: get_license_record
    name: get_license_record
    description: >
      Retrieve a provider's specific license record by NPI and state license number.
      Returns license type, expiration date, current status, and any existing
      extension details. Call after get_provider_profile.
    tool_type: read
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number from the auth session. Example: 1487392045"
      - name: state_license_number
        type: string
        description: "State license number in format STATE-TYPE-NUMBER (2-letter state, dash, 2-4 letter type, dash, 6-8 digits). Example: MA-RN-004821"

  - id: check_extension_eligibility
    name: check_extension_eligibility
    description: >
      Verify a license is eligible for an extension. Blocks if the license already
      has a pending extension, is under investigation, or has expired beyond the
      allowable window. Returns eligible: true and the expiration date on success.
      Must be called before submit_license_extension.
    tool_type: read
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number. Example: 1487392045"
      - name: state_license_number
        type: string
        description: "State license number in format STATE-TYPE-NUMBER. Example: MA-RN-004821"

  - id: submit_license_extension
    name: submit_license_extension
    description: >
      Submit a provisional or supervised extension request for an expiring provider
      license. For provisional extensions (independent practice while renewal is
      pending), do NOT include supervising_physician_npi. For supervised extensions
      (practice under a supervising physician), supervising_physician_npi is
      required. Returns a case_id. Call only after check_extension_eligibility
      returns eligible: true.
    tool_type: write
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number of the requesting provider. Example: 1487392045"
      - name: state_license_number
        type: string
        description: "State license number in format STATE-TYPE-NUMBER. Example: MA-RN-004821"
      - name: extension_type
        type: string
        description: "Type of extension: provisional (independent practice, no supervisor needed) or supervised (requires supervising physician NPI)"
      - name: extension_days
        type: integer
        description: "Duration of extension in days. Must be exactly 30, 60, or 90. No other values are accepted."
    optional_parameters:
      - name: supervising_physician_npi
        type: string
        description: "10-digit NPI of the supervising physician. REQUIRED for supervised extensions. Must be OMITTED for provisional extensions. This is a different NPI from the requesting provider."

  - id: notify_credentialing_committee
    name: notify_credentialing_committee
    description: >
      Notify the credentialing committee of a completed provider action. Called
      after submit_license_extension (notification_type: license_extension_submitted),
      update_malpractice_coverage (notification_type: malpractice_updated), or
      reactivate_privileges (notification_type: privilege_reactivation).
    tool_type: write
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number of the provider. Example: 1487392045"
      - name: case_id
        type: string
        description: "Case ID in format CASE-PREFIX-6digits, returned by the preceding write tool. Example: CASE-LIC-048271"
      - name: notification_type
        type: string
        description: "Type of notification: license_extension_submitted, malpractice_updated, or privilege_reactivation. Must match the action that was just completed."

  # ── FLOW 2: SHIFT SWAP ────────────────────────────────────────────────────────

  - id: get_shift_record
    name: get_shift_record
    description: >
      Retrieve a shift record for an authenticated employee. Confirms the shift
      belongs to the caller and returns shift details including unit_code, date,
      times, and current status. Also used in Flow 7 (payroll correction).
    tool_type: read
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP048271"
      - name: shift_id
        type: string
        description: "Shift ID in format SHF-YYYYMMDD-HHMM. Example: SHF-20260501-0700"

  - id: check_swap_eligibility
    name: check_swap_eligibility
    description: >
      Verify a shift is eligible to be swapped. Blocks if already swapped,
      cancelled, in the past, or within the 24-hour lockout window. Returns
      eligible: true, the shift date, the unit_code, and the required_cert_codes
      for that unit. Must be called before verify_colleague_certifications and
      confirm_shift_swap.
    tool_type: read
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP048271"
      - name: shift_id
        type: string
        description: "Shift ID in format SHF-YYYYMMDD-HHMM — same value used in get_shift_record. Example: SHF-20260501-0700"

  - id: verify_colleague_certifications
    name: verify_colleague_certifications
    description: >
      Verify that a colleague holds all certifications required to work a specific
      unit. The required certifications are looked up from the unit's certification
      requirements automatically — do not supply them. Returns a list of any missing
      certifications, or confirms all are met.
    tool_type: read
    domain: hr
    required_parameters:
      - name: colleague_employee_id
        type: string
        description: "Employee ID of the colleague who will take the shift, in format EMP followed by 6 digits. This is DIFFERENT from the authenticated caller's employee ID. Example: EMP039124"
      - name: unit_code
        type: string
        description: "Unit code from the shift record returned by check_swap_eligibility. Format: digits+letter-letters. Example: 4B-ICU"

  - id: confirm_shift_swap
    name: confirm_shift_swap
    description: >
      Confirm and record the shift swap between the authenticated employee and a
      colleague. Returns a case_id. Only call after verify_colleague_certifications
      returns no missing certifications.
    tool_type: write
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller (original shift owner). Example: EMP048271"
      - name: shift_id
        type: string
        description: "Shift ID in format SHF-YYYYMMDD-HHMM — the shift being swapped. Example: SHF-20260501-0700"
      - name: colleague_employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the colleague taking the shift. DIFFERENT from employee_id. Example: EMP039124"
      - name: unit_code
        type: string
        description: "Unit code from the shift record. Format: digits+letter-letters. Example: 4B-ICU"

  - id: notify_department_manager
    name: notify_department_manager
    description: >
      Notify the department manager of a completed employee action. Called after
      confirm_shift_swap (notification_type: shift_swap_confirmed), submit_fmla_case
      (notification_type: fmla_opened), submit_payroll_correction
      (notification_type: payroll_correction_submitted), or submit_pto_request
      (notification_type: pto_request_submitted).
    tool_type: write
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP048271"
      - name: case_id
        type: string
        description: "Case ID in format CASE-PREFIX-6digits, returned by the preceding write tool. Example: CASE-SWP-048271"
      - name: notification_type
        type: string
        description: "Type of notification: shift_swap_confirmed, fmla_opened, payroll_correction_submitted, or pto_request_submitted. Must match the action that was just completed."

  # ── FLOW 3: MALPRACTICE COVERAGE UPDATE ───────────────────────────────────────

  - id: get_malpractice_record
    name: get_malpractice_record
    description: >
      Retrieve a provider's current malpractice insurance record, including carrier,
      policy number, coverage limits, and effective/expiration dates. Call after
      get_provider_profile.
    tool_type: read
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number from the auth session. Example: 1487392045"

  - id: update_malpractice_coverage
    name: update_malpractice_coverage
    description: >
      Update malpractice insurance details for a provider. If the new
      per_occurrence_limit_usd is below $1,000,000, the tool automatically
      sets recredential_required: true and opens a re-credentialing case.
      Returns a case_id.
    tool_type: write
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number. Example: 1487392045"
      - name: new_carrier
        type: string
        description: "New malpractice carrier. Must be one of: proassurance, coverys, the_doctors_company, cna, zurich, or mag_mutual"
      - name: new_policy_number
        type: string
        description: "New policy number in format POL-YYYY-XXXXXX (POL, dash, 4-digit year, dash, 6 alphanumeric chars). This is DIFFERENT from the existing policy on file. Example: POL-2025-BK4420"
      - name: per_occurrence_limit_usd
        type: integer
        description: "Per-occurrence coverage limit in USD as a whole number. Example: 1000000 for one million dollars, 2000000 for two million"
      - name: aggregate_limit_usd
        type: integer
        description: "Aggregate coverage limit in USD as a whole number. Example: 3000000 for three million dollars"
      - name: effective_date
        type: string
        description: "New policy effective date in YYYY-MM-DD format. Example: 2026-07-01"
      - name: expiration_date
        type: string
        description: "New policy expiration date in YYYY-MM-DD format. Example: 2027-07-01"

  # ── FLOW 4: ONBOARDING TASK COMPLETION ───────────────────────────────────────

  - id: get_onboarding_checklist
    name: get_onboarding_checklist
    description: >
      Retrieve the onboarding task checklist for a new hire. Returns all tasks
      with their current status (pending or complete). Used to determine which
      tasks can be marked complete in this call.
    tool_type: read
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP072948"

  - id: complete_onboarding_task
    name: complete_onboarding_task
    description: >
      Mark a single onboarding task as complete. Must be called once per task —
      do not attempt to batch multiple tasks into one call. Returns the list of
      remaining incomplete tasks after the update.
    tool_type: write
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP072948"
      - name: task_code
        type: string
        description: "Task code to mark complete. Must be one of: BLS_UPLOAD, I9_VERIFY, BADGE_PICKUP, OCC_HEALTH, HIPAA_TRAIN, DRUG_SCREEN, TB_TEST, or ORIENTATION"

  - id: schedule_orientation_followup
    name: schedule_orientation_followup
    description: >
      Schedule an orientation follow-up appointment after onboarding tasks are
      completed. The appointment_datetime must be a slot confirmed as available
      by check_appointment_availability. Always called after all complete_onboarding_task
      calls and after check_appointment_availability.
    tool_type: write
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP072948"
      - name: department_code
        type: string
        description: "Department code from get_employee_record. Must be one of: CARDIOLOGY, EMERGENCY, ONCOLOGY, SURGERY, NEUROLOGY, PEDIATRICS, RADIOLOGY, PATHOLOGY, ORTHOPEDICS, or OBSTETRICS"
      - name: appointment_datetime
        type: string
        description: "Appointment date and time in YYYY-MM-DD HH:MM format. Must be a slot returned as available by check_appointment_availability. Example: 2026-05-05 09:00"

  # ── FLOW 5: DEA REGISTRATION TRANSFER ────────────────────────────────────────

  - id: get_dea_record
    name: get_dea_record
    description: >
      Retrieve a provider's DEA registration record. Requires both provider_auth
      AND otp_auth to be completed (two-factor). Returns DEA number, current
      facility, state, schedule codes, and expiration date.
    tool_type: read
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number from the auth session. Example: 1487392045"
      - name: dea_number
        type: string
        description: "DEA number: 2 uppercase letters followed by 7 digits. Provided by the caller. Example: BK4729183"

  - id: transfer_dea_registration
    name: transfer_dea_registration
    description: >
      Transfer a DEA registration to a new facility and state. The transfer
      overwrites the current facility/state on the record, moving the registration
      from the old location to the new one. Requires both provider_auth and
      otp_auth. Returns a case_id on success.
    tool_type: write
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number. Example: 1487392045"
      - name: dea_number
        type: string
        description: "DEA number: 2 uppercase letters + 7 digits — same value as used in get_dea_record. Example: BK4729183"
      - name: new_facility_code
        type: string
        description: "New facility code where the DEA will be transferred to. Format: 2-4 uppercase letters, dash, 2 digits, 1 letter. This is DIFFERENT from the facility code used during auth. Example: BWH-02A"
      - name: new_state_code
        type: string
        description: "2-letter US state abbreviation for the new facility location. Must be a valid state code. Example: CA, NY, TX"
      - name: transfer_reason
        type: string
        description: "Reason for transfer: facility_relocation (same role, moving), role_change (new clinical role at new facility), or additional_practice_site (adding second location, keeping original)"
      - name: effective_date
        type: string
        description: "Transfer effective date in YYYY-MM-DD format. Example: 2026-06-01"

  - id: notify_pdmp
    name: notify_pdmp
    description: >
      Notify the state Prescription Drug Monitoring Program of a DEA registration
      transfer. Always called after transfer_dea_registration succeeds. Use the
      new_state_code and new_facility_code from the transfer.
    tool_type: write
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number. Example: 1487392045"
      - name: dea_number
        type: string
        description: "DEA number: 2 uppercase letters + 7 digits. Example: BK4729183"
      - name: state_code
        type: string
        description: "2-letter US state abbreviation — the NEW state from transfer_dea_registration. Example: CA"
      - name: facility_code
        type: string
        description: "Facility code — the NEW facility from transfer_dea_registration. Format: 2-4 uppercase letters, dash, 2 digits, 1 letter. Example: BWH-02A"

  # ── FLOW 6: FMLA / LEAVE OF ABSENCE FILING ───────────────────────────────────

  - id: check_leave_eligibility
    name: check_leave_eligibility
    description: >
      Verify the employee meets FMLA eligibility requirements: 12 months of
      employment and 1,250 hours worked in the past year. Returns eligible: true,
      months employed, hours worked, and weeks of FMLA remaining. Must be called
      before submit_fmla_case.
    tool_type: read
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP048271"

  - id: submit_fmla_case
    name: submit_fmla_case
    description: >
      Open an FMLA leave case. Records leave category and start/end dates.
      Returns a case_id. Call only after check_leave_eligibility returns
      eligible: true.
    tool_type: write
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP048271"
      - name: leave_category
        type: string
        description: "FMLA leave category (mutually exclusive): employee_medical_condition (employee's own serious health condition), family_member_serious_illness (caring for ill family member), bonding (birth/adoption/foster within 12 months), or military_exigency (family member's active duty)"
      - name: leave_start_date
        type: string
        description: "Leave start date in YYYY-MM-DD format. Example: 2026-05-01"
      - name: leave_end_date
        type: string
        description: "Leave end date in YYYY-MM-DD format. Example: 2026-07-01"

  - id: schedule_return_to_work_checkin
    name: schedule_return_to_work_checkin
    description: >
      Schedule a return-to-work check-in appointment tied to an FMLA case.
      The appointment must be on or after the leave end date — the tool will
      reject appointments scheduled before the leave ends. The
      appointment_datetime must be a slot confirmed as available by
      check_appointment_availability. Called after notify_department_manager
      and check_appointment_availability.
    tool_type: write
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP048271"
      - name: case_id
        type: string
        description: "FMLA case ID in format CASE-FMLA-6digits, returned by submit_fmla_case. Example: CASE-FMLA-048271"
      - name: department_code
        type: string
        description: "Department code from get_employee_record. Must be one of: CARDIOLOGY, EMERGENCY, ONCOLOGY, SURGERY, NEUROLOGY, PEDIATRICS, RADIOLOGY, PATHOLOGY, ORTHOPEDICS, or OBSTETRICS"
      - name: appointment_datetime
        type: string
        description: "Appointment date and time in YYYY-MM-DD HH:MM format. Must be a slot returned as available by check_appointment_availability. Example: 2026-06-15 09:00"

  # ── FLOW 7: PAYROLL CORRECTION ───────────────────────────────────────────────

  - id: get_timesheet_record
    name: get_timesheet_record
    description: >
      Retrieve a timesheet entry for a specific shift. Confirms the shift belongs
      to the authenticated employee and returns logged hours, shift status, and
      the pay period end date for the shift.
    tool_type: read
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP048271"
      - name: shift_id
        type: string
        description: "Shift ID in format SHF-YYYYMMDD-HHMM. Example: SHF-20260501-0700"

  - id: check_correction_eligibility
    name: check_correction_eligibility
    description: >
      Verify a payroll correction can be submitted for a shift. Blocks if a
      correction is already pending, the pay period is closed, or the shift is
      not yet logged. Returns eligible: true and the currently logged hours on
      success. Must be called before submit_payroll_correction.
    tool_type: read
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP048271"
      - name: shift_id
        type: string
        description: "Shift ID in format SHF-YYYYMMDD-HHMM — same value used in get_timesheet_record. Example: SHF-20260501-0700"

  - id: submit_payroll_correction
    name: submit_payroll_correction
    description: >
      Submit a payroll correction for a specific shift. corrected_hours is the
      correct TOTAL hours for the shift, not the difference from what was logged.
      The pay period end date is read from the shift record automatically — if
      the pay period has already closed, the correction is rejected. Returns a
      case_id. Call only after check_correction_eligibility returns eligible: true.
    tool_type: write
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP048271"
      - name: shift_id
        type: string
        description: "Shift ID in format SHF-YYYYMMDD-HHMM — the shift being corrected. Example: SHF-20260501-0700"
      - name: correction_type
        type: string
        description: "Type of correction: on_call_hours, overtime_hours, or differential_missed"
      - name: corrected_hours
        type: float
        description: "Correct TOTAL hours for the shift (not the delta). Must be greater than 0 and at most 24. Example: 12.0 if 12 hours were actually worked"

  # ── FLOW 8: PRIVILEGE REACTIVATION ───────────────────────────────────────────

  - id: get_privilege_record
    name: get_privilege_record
    description: >
      Retrieve a provider's clinical privilege record including all privileges and
      their current status (active or suspended). Call after get_provider_profile.
      Requires otp_auth.
    tool_type: read
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number — provided by the caller after OTP auth. Example: 1487392045"

  - id: check_reactivation_eligibility
    name: check_reactivation_eligibility
    description: >
      Validate the occupational health clearance code before reactivating privileges.
      Returns eligible: true and the list of suspended privilege codes available for
      reactivation. Must be called before schedule_competency_review and
      reactivate_privileges.
    tool_type: read
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number. Example: 1487392045"
      - name: clearance_code
        type: string
        description: "Occupational health clearance code provided by the caller. Format: CLR-2-4 uppercase letters-6 digits. Example: CLR-OCC-048271"

  - id: schedule_competency_review
    name: schedule_competency_review
    description: >
      Schedule a competency review appointment for a provider returning from leave.
      Called BEFORE reactivate_privileges. The appointment_datetime must be a slot
      confirmed as available by check_appointment_availability. Use the
      department_code from get_provider_profile.
    tool_type: write
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number. Example: 1487392045"
      - name: department_code
        type: string
        description: "Department code from get_provider_profile. Must be one of: CARDIOLOGY, EMERGENCY, ONCOLOGY, SURGERY, NEUROLOGY, PEDIATRICS, RADIOLOGY, PATHOLOGY, ORTHOPEDICS, or OBSTETRICS"
      - name: appointment_datetime
        type: string
        description: "Appointment date and time in YYYY-MM-DD HH:MM format. Must be a slot returned as available by check_appointment_availability. Example: 2026-05-01 09:00"

  - id: reactivate_privileges
    name: reactivate_privileges
    description: >
      Reactivate one or more suspended clinical privileges for a provider returning
      from leave. Called AFTER schedule_competency_review. Returns a case_id.
      The privilege_codes must be a subset of the suspended privileges returned
      by check_reactivation_eligibility.
    tool_type: write
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number. Example: 1487392045"
      - name: privilege_codes
        type: array
        items:
          type: string
        description: "List of privilege codes to reactivate, format PRV-CATEGORY-3digits. Only include codes the caller explicitly confirmed. Example: [PRV-CARD-001, PRV-ICU-003]"
      - name: clearance_code
        type: string
        description: "Occupational health clearance code — same value used in check_reactivation_eligibility. Format: CLR-LETTERS-6digits. Example: CLR-OCC-048271"
      - name: leave_type_on_record
        type: string
        description: "The type of leave the provider was on (mutually exclusive): medical_leave (employer-approved medical, not FMLA), personal_leave (approved personal/unpaid, not medical or FMLA), or fmla_leave (FMLA-protected leave)"

  - id: update_ehr_access
    name: update_ehr_access
    description: >
      Update EHR system access permissions for a provider following privilege
      reactivation. Called after notify_credentialing_committee. Ask the caller
      whether full or restricted access should be restored.
    tool_type: write
    domain: hr
    required_parameters:
      - name: npi
        type: string
        description: "10-digit NPI number. Example: 1487392045"
      - name: case_id
        type: string
        description: "Case ID in format CASE-PRV-6digits, returned by reactivate_privileges. Example: CASE-PRV-048271"
      - name: access_change_type
        type: string
        description: "EHR access level chosen by the caller: reactivate_full (all modules, all patient records) or reactivate_restricted (limited/read-only access)"

  # ── FLOW 9: ON-CALL SCHEDULE REGISTRATION ────────────────────────────────────

  - id: get_oncall_schedule
    name: get_oncall_schedule
    description: >
      Retrieve the employee's current on-call schedule registrations for a unit.
      Returns existing registrations so the caller can confirm there are no
      conflicts before registering a new window.
    tool_type: read
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP048271"
      - name: unit_code
        type: string
        description: "Unit code to retrieve schedule for. Format: digits+letter-letters. Example: 4B-ICU"

  - id: check_oncall_eligibility
    name: check_oncall_eligibility
    description: >
      Verify the employee is eligible to register for on-call on a given unit.
      Blocks if the employee is on leave or missing required unit certifications.
      Returns eligible: true on success. Must be called before
      register_oncall_availability.
    tool_type: read
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP048271"
      - name: unit_code
        type: string
        description: "Unit code to check eligibility for. Format: digits+letter-letters. Example: 4B-ICU"

  - id: register_oncall_availability
    name: register_oncall_availability
    description: >
      Register an employee's on-call availability window including blackout dates.
      Blackout dates must fall within the availability window or the tool will
      reject them. Pass an empty list [] if the caller has no blackout dates.
      Returns a registration_id.
    tool_type: write
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP048271"
      - name: unit_code
        type: string
        description: "Unit code for the on-call registration. Format: digits+letter-letters. Example: 4B-ICU"
      - name: availability_start_date
        type: string
        description: "Start of availability window in YYYY-MM-DD format. Example: 2026-06-01"
      - name: availability_end_date
        type: string
        description: "End of availability window in YYYY-MM-DD format. Example: 2026-06-30"
      - name: oncall_tier
        type: string
        description: "On-call tier: primary (first to be called) or backup (called if primary is unavailable)"
      - name: blackout_dates
        type: array
        items:
          type: string
        description: "List of dates within the window when the employee is unavailable, each in YYYY-MM-DD format. Pass empty list [] if none. Each date must fall within the availability window."

  # ── FLOW 10: I-9 VERIFICATION ─────────────────────────────────────────────────

  - id: get_i9_record
    name: get_i9_record
    description: >
      Retrieve the current I-9 verification record for an employee, including
      verification status and any previously submitted document details.
      Call after get_employee_record.
    tool_type: read
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP072948"

  - id: submit_i9_verification
    name: submit_i9_verification
    description: >
      Submit or update I-9 document verification for an employee. The document_number
      must be captured exactly from the caller and read back before submitting.
      Returns a case_id.
    tool_type: write
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP072948"
      - name: verification_action
        type: string
        description: "Action type: initial_verification (first-time I-9) or reverification (updating expiring documents)"
      - name: document_list_type
        type: string
        description: "I-9 document list: LIST_A (single document proving both identity and work auth), LIST_B (identity only), or LIST_C (work auth only)"
      - name: document_type_code
        type: string
        description: "Document type: US_PASSPORT, PERM_RESIDENT_CARD, EAD, DRIVERS_LICENSE, STATE_ID, SSN_CARD, or BIRTH_CERT"
      - name: document_number
        type: string
        description: "Document ID number: 6-12 uppercase alphanumeric characters. Capture exactly as spoken by the caller. Example: A12345678"
      - name: document_expiration_date
        type: string
        description: "Document expiration date in YYYY-MM-DD format. Example: 2030-08-14"
      - name: issuing_country_code
        type: string
        description: "2-letter ISO country code of the issuing country. Convert country names to codes. Example: US, IN, MX"

  - id: notify_hr_compliance
    name: notify_hr_compliance
    description: >
      Notify HR compliance of a completed I-9 verification. Always called after
      submit_i9_verification. Use notification_type i9_verified for
      initial_verification or i9_reverified for reverification.
    tool_type: write
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP072948"
      - name: case_id
        type: string
        description: "Case ID in format CASE-I9-6digits, returned by submit_i9_verification. Example: CASE-I9-072948"
      - name: notification_type
        type: string
        description: "Must be i9_verified (if verification_action was initial_verification) or i9_reverified (if verification_action was reverification)"

  # ── FLOW 11: VISA DEPENDENT ADDITION ─────────────────────────────────────────

  - id: get_visa_record
    name: get_visa_record
    description: >
      Retrieve a visa sponsorship record for an employee. The visa_petition_number
      must be provided by the caller and read back before calling.
      Requires otp_auth.
    tool_type: read
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — from the OTP auth session. Example: EMP081034"
      - name: visa_petition_number
        type: string
        description: "Visa petition number: 3 uppercase letters followed by 10 digits. Provided by the caller. Example: WAC2512045678"

  - id: add_visa_dependent
    name: add_visa_dependent
    description: >
      Add a dependent to an existing visa petition. The dependent's name must be
      spelled out by the caller and confirmed before submitting. Returns an
      amendment_id.
    tool_type: write
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP081034"
      - name: visa_petition_number
        type: string
        description: "Visa petition number: 3 uppercase letters + 10 digits — same value used in get_visa_record. Example: WAC2512045678"
      - name: dependent_first_name
        type: string
        description: "Dependent's first name, 2-30 characters, letters and hyphens only. Ask the caller to spell it. Example: Priya, Jean-Luc"
      - name: dependent_last_name
        type: string
        description: "Dependent's last name, 2-30 characters, letters and hyphens only. Ask the caller to spell it. Example: Sharma, Dupont"
      - name: relationship
        type: string
        description: "Relationship to the employee: spouse, child, or domestic_partner"
      - name: dependent_date_of_birth
        type: string
        description: "Dependent's date of birth in YYYY-MM-DD format. Example: 2024-03-15"
      - name: dependent_country_of_birth
        type: string
        description: "2-letter ISO country code for dependent's country of birth. Convert country names to codes. Example: IN, US, MX"
      - name: uscis_receipt_number
        type: string
        description: "USCIS receipt number for the petition amendment: 3 uppercase letters + 10 digits. This is DIFFERENT from the visa petition number. Example: IOE0912345678"

  - id: notify_immigration_counsel
    name: notify_immigration_counsel
    description: >
      Notify immigration counsel of a visa petition change. Always called after
      add_visa_dependent with notification_type: dependent_added.
    tool_type: write
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP081034"
      - name: visa_petition_number
        type: string
        description: "Visa petition number: 3 uppercase letters + 10 digits — same value from the session. Example: WAC2512045678"
      - name: notification_type
        type: string
        description: "Must be dependent_added for this flow"

  # ── FLOW 12: PTO REQUEST ─────────────────────────────────────────────────────

  - id: get_pto_balance
    name: get_pto_balance
    description: >
      Retrieve an employee's PTO balances by type (pto and sick). Also returns
      the employee's schedule_type (standard or shift) which determines how PTO
      days are calculated. Call after get_employee_record.
    tool_type: read
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP048271"

  - id: check_pto_eligibility
    name: check_pto_eligibility
    description: >
      Check whether an employee can take PTO for a given date range. Validates
      sufficient balance, no department blackout conflicts, and no overlap with
      existing PTO requests. Returns the exact working days that will count as
      PTO and the number of days to be deducted. For standard (M-F) employees,
      only weekdays minus org holidays count. For shift employees, only
      scheduled shifts in the range count. Must be called before submit_pto_request.
    tool_type: read
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP048271"
      - name: pto_type
        type: string
        description: "Type of PTO to use: pto (general paid time off for vacation/personal) or sick (sick leave)"
      - name: start_date
        type: string
        description: "First day of requested time off in YYYY-MM-DD format. Example: 2026-05-07"
      - name: end_date
        type: string
        description: "Last day of requested time off in YYYY-MM-DD format. Example: 2026-05-13"

  - id: submit_pto_request
    name: submit_pto_request
    description: >
      Submit a PTO request for a date range. Recomputes the PTO days internally
      and deducts from the employee's balance. Returns a case_id and the exact
      days deducted. Call only after check_pto_eligibility returns eligible: true
      and the caller has confirmed the details.
    tool_type: write
    domain: hr
    required_parameters:
      - name: employee_id
        type: string
        description: "Employee ID in format EMP followed by 6 digits — the authenticated caller's ID. Example: EMP048271"
      - name: pto_type
        type: string
        description: "Type of PTO to use: pto (general paid time off) or sick (sick leave). Same value used in check_pto_eligibility."
      - name: start_date
        type: string
        description: "First day of requested time off in YYYY-MM-DD format. Same value used in check_pto_eligibility. Example: 2026-05-07"
      - name: end_date
        type: string
        description: "Last day of requested time off in YYYY-MM-DD format. Same value used in check_pto_eligibility. Example: 2026-05-13"
